name: Daily Research Log

on:
  push:
  schedule:
    # 23:00 Asia/Seoul == 14:00 UTC
    - cron: "0 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-daily-log:
    if: ${{ github.event_name != 'push' || github.event.head_commit.message != 'chore: update daily research log' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily research log
        run: python Auto_Github/scripts/generate_daily_log.py

      - name: Commit and push generated logs
        shell: bash
        run: |
          if [ -z "$(git status --porcelain -- Auto_Github/daily_logs Auto_Github/project_context.json)" ]; then
            echo "No generated file changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Auto_Github/daily_logs Auto_Github/project_context.json
          git commit -m "chore: update daily research log"
          git push
